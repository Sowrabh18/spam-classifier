# ─────────────────────────────────────────────────────
# docker-compose.yml
#
# Runs the spam classifier FastAPI prediction API.
# MLflow runs separately on your local machine.
#
# Run with: docker compose up
# Stop with: docker compose down
# ─────────────────────────────────────────────────────

services:

  fastapi:
    # Build image from our Dockerfile
    build: .

    # Readable container name
    container_name: spam-classifier-api

    # Map laptop port 8000 to container port 8000
    ports:
      - "8000:8000"

    # Bridge models folder so container can
    # access trained model without baking it
    # into the image
    volumes:
      - ./models:/app/models

    # Print logs immediately, no buffering
    environment:
      - PYTHONUNBUFFERED=1

    # Auto restart if container crashes
    restart: unless-stopped