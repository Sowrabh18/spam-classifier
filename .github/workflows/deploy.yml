# ─────────────────────────────────────────────────────
# .github/workflows/deploy.yml
#
# CI/CD pipeline for spam classifier.
# Triggers on every push to main branch.
#
# Steps:
# 1. Run tests
# 2. Copy code to AWS
# 3. Rebuild and restart Docker on AWS
# ─────────────────────────────────────────────────────

name: Deploy Spam Classifier

# ── Trigger ────────────────────────────────────────────
on:
  push:
    branches: [main]

# ── Jobs ───────────────────────────────────────────────
jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Get the code ──────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Step 2: Set up Python ─────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ── Step 3: Install libraries ─────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 4: Run tests ─────────────────────────────
      - name: Run tests
        run: python -m pytest tests/

      # ── Step 5: Copy code to AWS ──────────────────────
      - name: Copy code to AWS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          AWS_HOST: ${{ secrets.AWS_HOST }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem
          scp -i key.pem -o StrictHostKeyChecking=no -r \
            src models main.py Dockerfile \
            docker-compose.yml requirements.txt \
            ubuntu@$AWS_HOST:~/spam-classifier/

      # ── Step 6: Rebuild and restart on AWS ────────────
      - name: Deploy on AWS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          AWS_HOST: ${{ secrets.AWS_HOST }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$AWS_HOST \
            "cd ~/spam-classifier && \
             docker compose down && \
             docker compose up -d --build"